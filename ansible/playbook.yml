---
- name: SSH Access Automation and Hardening
  hosts: servers
  become: yes

  vars:
    ssh_user: deepika
    ssh_home: "/home/deepika"
    ssh_public_key_path: "/home/deepika/.ssh/secure_ssh_project_key.pub"

  tasks:

    - name: Ensure .ssh directory exists
      file:
        path: "{{ ssh_home }}/.ssh"
        state: directory
        owner: "{{ ssh_user }}"
        group: "{{ ssh_user }}"
        mode: '0700'

    - name: Add SSH public key to authorized_keys
      authorized_key:
        user: "{{ ssh_user }}"
        state: present
        key: "{{ lookup('file', ssh_public_key_path) }}"

    - name: Verify authorized_keys exists
      stat:
        path: "{{ ssh_home }}/.ssh/authorized_keys"
      register: auth_key

    - name: Display verification result
      debug:
        msg: "authorized_keys exists: {{ auth_key.stat.exists }}"

    - name: Harden SSH configuration
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?{{ item.key }}"
        line: "{{ item.key }} {{ item.value }}"
        backup: yes
      loop:
        - { key: "PermitRootLogin", value: "no" }
        - { key: "PasswordAuthentication", value: "no" }
        - { key: "PubkeyAuthentication", value: "yes" }
        - { key: "KbdInteractiveAuthentication", value: "no" }
      notify: Restart SSH

    - name: Verify effective SSH hardening settings
      command: sshd -T
      register: sshd_effective_config
      changed_when: false

    - name: Display SSH hardening verification
      debug:
        msg:
          - "{{ sshd_effective_config.stdout_lines | select('search', 'permitrootlogin|passwordauthentication|pubkeyauthentication|kbdinteractiveauthentication') | list }}"

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted